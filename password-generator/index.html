<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator — Nakanosec Tools</title>
    <meta name="description"
        content="Generate cryptographically strong random passwords with customizable length, character sets, and a visual strength meter.">
    <link rel="canonical" href="https://tools.nakanosec.com/password-generator/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../tools.css">
</head>

<body>
    <header class="tool-header">
        <div class="container tool-header-inner"><a href="../" class="tool-header-back"><svg viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>All Tools</a><span class="tool-header-brand">Nakanosec<span>Tools</span></span></div>
    </header>
    <section class="tool-hero">
        <div class="container">
            <div class="tool-hero-icon generator">🔑</div>
            <h1>Random Password Generator</h1>
            <p>Generate cryptographically strong passwords with customizable options and visual strength feedback.</p>
        </div>
    </section>
    <main class="tool-workspace">
        <div class="container">
            <div class="tool-card-panel">
                <h2>🔑 Generated Password</h2>
                <div class="password-display" id="password-display">Click Generate!</div>
                <div class="strength-meter">
                    <div class="strength-meter-fill" id="strength-fill"></div>
                </div>
                <p style="text-align:center;margin-top:0.5rem;font-size:var(--fs-sm);color:var(--clr-text-muted);"
                    id="strength-label">—</p>
                <div class="btn-group" style="justify-content:center;">
                    <button class="btn btn-primary" id="generate-btn" type="button">Generate Password</button>
                    <button class="btn btn-secondary" id="copy-btn" type="button">Copy</button>
                </div>
            </div>
            <div class="tool-card-panel">
                <h2>⚙️ Options</h2>
                <div class="form-group">
                    <label class="form-label">Password Length: <span id="length-display">16</span></label>
                    <div class="range-group">
                        <span style="font-size:var(--fs-xs);color:var(--clr-text-muted);">4</span>
                        <input type="range" id="length-slider" min="4" max="128" value="16">
                        <span style="font-size:var(--fs-xs);color:var(--clr-text-muted);">128</span>
                    </div>
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" id="opt-upper" checked> Uppercase (A-Z)</label>
                    <label class="checkbox-label"><input type="checkbox" id="opt-lower" checked> Lowercase (a-z)</label>
                    <label class="checkbox-label"><input type="checkbox" id="opt-numbers" checked> Numbers (0-9)</label>
                    <label class="checkbox-label"><input type="checkbox" id="opt-symbols" checked> Symbols
                        (!@#$...)</label>
                </div>
            </div>
        </div>
    </main>
    <footer class="tool-footer">
        <div class="container">
            <p>&copy; 2024 <a href="../">Nakanosec Tools</a> — For authorized security testing only.</p>
        </div>
    </footer>
    <script>
        (function () {
            'use strict';
            var UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            var LOWER = 'abcdefghijklmnopqrstuvwxyz';
            var NUMBERS = '0123456789';
            var SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?/~';
            var slider = document.getElementById('length-slider');
            var lengthDisplay = document.getElementById('length-display');
            var passwordDisplay = document.getElementById('password-display');
            var strengthFill = document.getElementById('strength-fill');
            var strengthLabel = document.getElementById('strength-label');
            var generateBtn = document.getElementById('generate-btn');
            var copyBtn = document.getElementById('copy-btn');

            slider.addEventListener('input', function () { lengthDisplay.textContent = slider.value; });

            function getCharset() {
                var cs = '';
                if (document.getElementById('opt-upper').checked) cs += UPPER;
                if (document.getElementById('opt-lower').checked) cs += LOWER;
                if (document.getElementById('opt-numbers').checked) cs += NUMBERS;
                if (document.getElementById('opt-symbols').checked) cs += SYMBOLS;
                return cs;
            }

            function generate() {
                var cs = getCharset();
                if (!cs) { alert('Select at least one character set.'); return; }
                var len = parseInt(slider.value);
                var arr = new Uint32Array(len);
                crypto.getRandomValues(arr);
                var pw = '';
                for (var i = 0; i < len; i++) pw += cs[arr[i] % cs.length];
                passwordDisplay.textContent = pw;
                updateStrength(pw, cs);
            }

            function updateStrength(pw, cs) {
                var entropy = pw.length * Math.log2(cs.length);
                var pct = Math.min(entropy / 128 * 100, 100);
                var label, color;
                if (entropy < 28) { label = 'Very Weak'; color = '#f87171'; }
                else if (entropy < 36) { label = 'Weak'; color = '#fb923c'; }
                else if (entropy < 60) { label = 'Fair'; color = '#fbbf24'; }
                else if (entropy < 80) { label = 'Strong'; color = '#34d399'; }
                else { label = 'Very Strong'; color = '#38bdf8'; }
                strengthFill.style.width = pct + '%';
                strengthFill.style.background = color;
                strengthLabel.textContent = label + ' (' + Math.round(entropy) + ' bits of entropy)';
                strengthLabel.style.color = color;
            }

            generateBtn.addEventListener('click', generate);
            copyBtn.addEventListener('click', function () {
                var pw = passwordDisplay.textContent;
                if (!pw || pw === 'Click Generate!') return;
                navigator.clipboard.writeText(pw).then(function () {
                    copyBtn.textContent = 'Copied!'; copyBtn.classList.add('copied');
                    setTimeout(function () { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
                });
            });

            generate();
        })();
    </script>
</body>

</html>
